services:
  mysql:
    image: mysql:8.0
    container_name: campuslearn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: campus_root_pass
      MYSQL_DATABASE: campus_learn
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus_pass
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ucampus", "-pcampus_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - campuslearn

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campuslearn-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://campus:campus_pass@mysql:3306/campus_learn
      JWT_SECRET: campus-learn-jwt-secret-change-in-production-2024
      JWT_EXPIRATION_HOURS: "24"
      DB_MAX_CONNECTIONS: "10"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
      RUST_LOG: info
      ALLOWED_ORIGIN: "http://localhost:3000"
      # APP_ENV controls startup validation strictness.
      # In development the fallback key is used when DATA_ENCRYPTION_KEY is absent.
      # Set APP_ENV=production and generate a real key before any shared deployment:
      #   openssl rand -hex 32
      APP_ENV: development
      MEDIA_UPLOAD_DIR: "/app/uploads"
      # INSECURE dev key — bytes 0x01..0x20. Replace before deploying anywhere.
      DATA_ENCRYPTION_KEY: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
      # Rate limits — raised for dev/test environments where many requests
      # come from a single IP and user. Lower these for production.
      RATE_LIMIT_PER_MINUTE: "120"
      LOGIN_RATE_LIMIT_PER_MINUTE: "60"
      LOGIN_RATE_LIMIT_PER_HOUR: "500"
      LOGIN_LOCKOUT_THRESHOLD: "20"
      LOGIN_LOCKOUT_MINUTES: "5"
      # Background job loop tick.
      # JOB_TICK_SECONDS: "60"
    ports:
      - "8000:8000"
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s
    networks:
      - campuslearn

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campuslearn-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - campuslearn


volumes:
  mysql_data:
  media_uploads:

networks:
  campuslearn:
    driver: bridge
